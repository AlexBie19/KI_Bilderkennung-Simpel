# Flutter project configuration for the KI Kleidungserkennung app.
# The app uses the device camera to photograph a clothing item and classifies
# it with a MobileNetV2 TFLite model fine-tuned on the Fashion-MNIST dataset.
# Input pipeline: center-crop → 96×96 RGB → normalise to [−1, 1].

name: clothing_recognizer
description: >
  Eine Flutter-App, die ein Foto aufnimmt, es auf 96×96 RGB vorverarbeitet
  und das Kleidungsstück mit einem MobileNetV2-Modell klassifiziert.
  Erweiterbar für Farb- und Mustererkennung.

# Semantic versioning: major.minor.patch+build
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera access (live preview and capture) for Android and iOS
  camera: ^0.12.0+1

  # TensorFlow Lite inference engine for running the clothing classifier
  tflite_flutter: ^0.12.1

  # Image manipulation: grayscale conversion and resizing to 28×28 pixels
  image: ^4.1.3

  # Runtime camera and storage permission requests on both platforms
  permission_handler: ^12.0.1

  # Access to device-local directories (used when saving temp image files)
  path_provider: ^2.1.2

  # Utility for building cross-platform file paths
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Official Flutter lint rule set (enforces clean-code conventions)
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Bundled assets: TFLite model file and the label list
  assets:
    - assets/models/fashion_mnist_model.tflite
    - assets/models/labels.txt
