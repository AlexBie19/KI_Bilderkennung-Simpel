# Flutter project configuration for the Clothing Recognizer app.
# This app uses the camera to take a picture and classifies clothing
# using a TensorFlow Lite model trained on the Fashion-MNIST dataset.

name: clothing_recognizer
description: >
  A Flutter app that captures a photo, preprocesses it to match the
  Fashion-MNIST format (28×28 grayscale), and classifies the clothing
  item using a TFLite model. Designed to be extended later with color
  and pattern recognition.

# Semantic versioning: major.minor.patch+build
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera access (live preview and capture) for Android and iOS
  camera: ^0.10.5+9

  # TensorFlow Lite inference engine for running the clothing classifier
  tflite_flutter: ^0.10.4

  # Image manipulation: grayscale conversion and resizing to 28×28 pixels
  image: ^4.1.3

  # Runtime camera and storage permission requests on both platforms
  permission_handler: ^11.3.1

  # Access to device-local directories (used when saving temp image files)
  path_provider: ^2.1.2

  # Utility for building cross-platform file paths
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Official Flutter lint rule set (enforces clean-code conventions)
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Bundled assets: TFLite model file and the label list
  assets:
    - assets/models/fashion_mnist_model.tflite
    - assets/models/labels.txt
